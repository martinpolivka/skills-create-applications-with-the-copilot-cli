name: Step 2

on:
  workflow_dispatch:
  push:
    branches:
      - 'participant/*'
    paths:
      - 'src/*.js'

permissions:
  contents: write
  issues: write

jobs:
  find_exercise:
    name: Find participant exercise issue
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.find.outputs.issue-number }}
      issue-url: ${{ steps.find.outputs.issue-url }}
    steps:
      - name: Find exercise issue for participant branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EXERCISE_TITLE: "Create applications with the Copilot CLI"
        run: |
          branch="$HEAD_REF"
          if [ -z "$branch" ] && [[ "$ISSUE_TITLE" =~ \[(participant/[^]]+)\] ]]; then
            branch="${BASH_REMATCH[1]}"
          fi
          if [ -z "$branch" ] && [[ "$REF_NAME" == participant/* ]]; then
            branch="$REF_NAME"
          fi
          if [ -z "$branch" ]; then
            echo "Unable to determine participant branch for this event." >&2
            exit 1
          fi
          marker="[$branch]"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            echo "No open exercise issue found for $EXERCISE_TITLE $marker." >&2
            exit 1
          fi
          issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  check_step_work:
    name: Check step work
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Check if calculator.js has addition function
        id: check-addition-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: addition

      - name: Check if calculator.js has subtraction function
        id: check-subtraction-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: subtraction

      - name: Check if calculator.js has multiplication function
        id: check-multiplication-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: multiplication

      - name: Check if calculator.js has division function
        id: check-division-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: division

      - name: Create comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Calculator has 'addition' function"
                passed: ${{ steps.check-addition-function.outcome == 'success' }}
              - description: "Calculator has 'subtraction' function"
                passed: ${{ steps.check-subtraction-function.outcome == 'success' }}
              - description: "Calculator has 'multiplication' function"
                passed: ${{ steps.check-multiplication-function.outcome == 'success' }}
              - description: "Calculator has 'division' function"
                passed: ${{ steps.check-division-function.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1
