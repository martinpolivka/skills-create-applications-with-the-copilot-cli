name: Step 4 # Last step of the exercise

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: write

jobs:
  find_exercise:
    name: Find participant exercise issue
    if: startsWith(github.head_ref, 'participant/')
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.find.outputs.issue-number }}
      issue-url: ${{ steps.find.outputs.issue-url }}
    steps:
      - name: Find exercise issue for participant branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EXERCISE_TITLE: "Create applications with the Copilot CLI"
        run: |
          branch="$HEAD_REF"
          if [ -z "$branch" ] && [[ "$ISSUE_TITLE" =~ \[(participant/[^]]+)\] ]]; then
            branch="${BASH_REMATCH[1]}"
          fi
          if [ -z "$branch" ] && [[ "$REF_NAME" == participant/* ]]; then
            branch="$REF_NAME"
          fi
          if [ -z "$branch" ]; then
            echo "Unable to determine participant branch for this event." >&2
            exit 1
          fi
          marker="[$branch]"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            echo "No open exercise issue found for $EXERCISE_TITLE $marker." >&2
            exit 1
          fi
          issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  check_step_work:
    name: Check step work
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Check if at least 3 issues exist
        id: check-issue-count
        continue-on-error: true
        run: |
          ISSUE_COUNT=$(gh issue list --repo ${{ github.repository }} --state all --json number --jq 'length')
          echo "Found $ISSUE_COUNT issues"
          if [ "$ISSUE_COUNT" -ge 3 ]; then
            echo "At least 3 issues exist"
            exit 0
          else
            echo "Less than 3 issues exist"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "At least 3 issues exist in repository"
                passed: ${{ steps.check-issue-count.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1
