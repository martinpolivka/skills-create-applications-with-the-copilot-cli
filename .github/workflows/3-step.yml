name: Step 3

on:
  workflow_dispatch:
  push:
    branches:
      - 'participant/*'
    paths:
      - 'src/tests/*.js'

permissions:
  contents: write
  issues: write

jobs:
  find_exercise:
    name: Find participant exercise issue
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.find.outputs.issue-number }}
      issue-url: ${{ steps.find.outputs.issue-url }}
    steps:
      - name: Find exercise issue for participant branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EXERCISE_TITLE: "Create applications with the Copilot CLI"
        run: |
          branch="$HEAD_REF"
          if [ -z "$branch" ] && [[ "$ISSUE_TITLE" =~ \[(participant/[^]]+)\] ]]; then
            branch="${BASH_REMATCH[1]}"
          fi
          if [ -z "$branch" ] && [[ "$REF_NAME" == participant/* ]]; then
            branch="$REF_NAME"
          fi
          if [ -z "$branch" ]; then
            echo "Unable to determine participant branch for this event." >&2
            exit 1
          fi
          marker="[$branch]"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            echo "No open exercise issue found for $EXERCISE_TITLE $marker." >&2
            exit 1
          fi
          issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  check_step_work:
    name: Check step work
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      - name: Detect calculator test file
        id: detect-test-file
        run: |
          if [ -f "src/tests/calculator.test.js" ]; then
            echo "path=src/tests/calculator.test.js" >> "$GITHUB_OUTPUT"
          elif [ -f "src/tests/calculator.tests.js" ]; then
            echo "path=src/tests/calculator.tests.js" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Expected src/tests/calculator.test.js or src/tests/calculator.tests.js but neither was found"
            exit 1
          fi

      - name: Check if calculator test file has a modulo test
        id: check-modulo-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: modulo

      - name: Check if calculator test file has a power test
        id: check-power-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: power

      - name: Check if calculator test file has a 'square root' test
        id: check-sqrt-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: 'square'

      - name: Create comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "Calculator tests has 'modulo' test"
                passed: ${{ steps.check-modulo-test.outcome == 'success' }}
              - description: "Calculator tests has 'power' test"
                passed: ${{ steps.check-power-test.outcome == 'success' }}
              - description: "Calculator tests has 'squareroot' test"
                passed: ${{ steps.check-sqrt-test.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1
